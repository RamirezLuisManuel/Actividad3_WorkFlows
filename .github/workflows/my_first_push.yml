# Ramirez Ramirez Luis Manuel
name: Mi Primer Push
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs: 
  Tarea1:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Informe
        run: |
          echo "Hi my first Push"
          echo "My name Luis Manuel Ramirez"
          echo "Mensaje: ${{github.event.head_commit.message}}"
          echo "Autor: ${{github.event.head_commit.author.name}}"
          echo "Id: ${{github.event.head_commit.id}}"
          echo "URL: ${{github.event.head_commit.url}}"
          echo "Rama: ${{github.ref_name}}
          echo "Repositorio: ${{github.repository}}"
          
  Tarea2:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Informe
        run: |
          echo "Hi my first Pull"
          echo "My name Luis Manuel Ramirez"
          echo "====Datos origen===="
          echo "Repositorio origen: ${{github.event.pull_request.head.repo.full_name}}$"
          echo "Rama origen: ${{github.event.pull_request.head.ref}}$"
          echo "====Datos destino===="
          echo "Repositorio destino: ${{github.event.pull_request.base.repo.full_name}}$"
          echo "Rama destino: ${{github.event.pull_request.base.ref}}$"
          echo "====Informacion de PR===="
          echo "Titulo: ${{github.event.pull_request.title}}$"
          echo "Contenido: ${{github.event.pull_request.body}}$"
          echo "Estado: ${{github.event.pull_request.state}}$"
          echo "Fusionado: ${{github.event.pull_request.merged}}$"
